<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ASCB KwanKiDo</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;font-family:'Cairo';}
body{background:#000;color:white;overflow-x:hidden;}

#particles-js{
position:fixed;width:100%;height:100%;z-index:-1;
}

nav{
display:flex;justify-content:space-between;padding:20px;
background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
}

nav h1{color:red;text-shadow:0 0 10px red;}

.hero{
height:100vh;display:flex;justify-content:center;align-items:center;
}
.hero h1{
font-size:50px;animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px red;}
to{text-shadow:0 0 40px orange;}
}

.card{
margin:30px;padding:30px;border-radius:20px;
background:rgba(255,255,255,0.05);
box-shadow:0 0 25px rgba(255,0,0,0.5);
}

input{padding:10px;margin:10px;width:80%;border:none;border-radius:10px;}
button{padding:10px;background:red;color:white;border:none;border-radius:10px;cursor:pointer;}

.player{
background:#111;margin:10px;padding:10px;border-left:4px solid red;
}

/* CHAT */
.chat-btn{
position:fixed;bottom:20px;right:20px;background:red;
padding:15px;border-radius:50%;cursor:pointer;
box-shadow:0 0 15px red;
}

.chat-box{
position:fixed;bottom:80px;right:20px;width:300px;
background:#111;border-radius:15px;display:none;
box-shadow:0 0 20px red;
}
.chat-header{background:red;padding:10px;text-align:center;}
.chat-body{height:250px;overflow-y:auto;padding:10px;}
</style>
</head>

<body>

<div id="particles-js"></div>

<nav>
<h1>🔥 ASCB</h1>
</nav>

<div class="hero">
<h1>نادي أشبال بوڨرة للكوانكيدو</h1>
</div>

<section class="card">
<h2>🧑‍🎓 تسجيل لاعب</h2>
<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">
<button onclick="addPlayer()">تسجيل</button>
<p id="msg"></p>
</section>

<section class="card">
<h2>🔍 بحث</h2>
<input id="search" placeholder="ابحث..." onkeyup="searchPlayer()">
</section>

<section class="card">
<h2>📊 اللاعبين</h2>
<div id="players"></div>
</section>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
<div class="chat-header">🤖 AI KwanKiDo</div>
<div class="chat-body" id="chatBody"></div>
<input id="userInput" placeholder="اسأل...">
<button onclick="sendMessage()">إرسال</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
particlesJS("particles-js",{
particles:{number:{value:80},color:{value:"#ff0000"},move:{speed:3}}
});

/* PLAYERS */
let players=[];

function savePlayers(){
localStorage.setItem("players",JSON.stringify(players));
}

function loadPlayers(){
let data=localStorage.getItem("players");
if(data){players=JSON.parse(data);renderPlayers();}
}
window.onload=loadPlayers;

function addPlayer(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(name==""||phone==""){
document.getElementById("msg").innerHTML="❌ عبي المعلومات";
return;
}

let id="ASCB-"+Math.floor(Math.random()*10000);
players.push({name,phone,id});
savePlayers();

new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play();

document.getElementById("msg").innerHTML="✅ تم التسجيل "+id;
renderPlayers();
}

function renderPlayers(){
let c=document.getElementById("players");
c.innerHTML="";
players.forEach((p,i)=>{
c.innerHTML+=`
<div class="player">
${p.name} - ${p.phone} <br>
${p.id}
<br>
<button onclick="deletePlayer(${i})">حذف</button>
</div>`;
});
}

function deletePlayer(i){
players.splice(i,1);
savePlayers();
renderPlayers();
}

function searchPlayer(){
let v=document.getElementById("search").value.toLowerCase();
let c=document.getElementById("players");
c.innerHTML="";
players.filter(p=>p.name.toLowerCase().includes(v))
.forEach((p,i)=>{
c.innerHTML+=`<div class="player">${p.name}</div>`;
});
}

/* CHAT */
function toggleChat(){
let b=document.getElementById("chatBox");
b.style.display=b.style.display=="block"?"none":"block";
}

const qa=[
{q:"كوانكيدو",a:"🥋 فن قتالي فيتنامي"},
{q:"العمر",a:"👶 من 5 سنوات"},
{q:"فوائد",a:"💪 قوة وتركيز"},
{q:"التسجيل",a:"📋 سجل فوق"},
{q:"بطولات",a:"🏆 نعم كاين"},
{q:"هل صعب",a:"😅 ساهل مع الوقت"},
{q:"بنات",a:"👧 مناسب"},
{q:"مدرب",a:"👨‍🏫 كاين مدربين"},
{q:"كم مرة",a:"📅 3 مرات"},
{q:"سعر",a:"💰 حسب النادي"}
];

function getAIResponse(msg){
msg=msg.toLowerCase();
for(let i=0;i<qa.length;i++){
if(msg.includes(qa[i].q)) return qa[i].a;
}
return "🤖 حاول تسقسي بطريقة أخرى";
}

function sendMessage(){
let input=document.getElementById("userInput");
let msg=input.value;
let chat=document.getElementById("chatBody");

if(msg=="")return;

chat.innerHTML+="<div>🧑 "+msg+"</div>";
let reply=getAIResponse(msg);

setTimeout(()=>{
chat.innerHTML+="<div>🤖 "+reply+"</div>";
chat.scrollTop=chat.scrollHeight;
},500);

input.value="";
}
</script>

</body>
</html>
